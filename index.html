<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            margin-top: 120px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: red;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #message {
            display: none;
            margin-top: 30px;
            font-size: 24px;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: red;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }
    </style>
</head>

<body>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<div class="container">
    <h1>Hey ❤️</h1>
    <p>I made something just for you...</p>

    <button onclick="startSurprise()">Click me 💖</button>

    <div id="message">
        <p>You are the best thing in my life 💕</p>
        <p>I’m really lucky to have you 🥰</p>
        <p>Love you always ❤️</p>
    </div>
</div>

<script>
function startSurprise() {
    document.getElementById("message").style.display = "block";
    document.getElementById("music").play();

    // create hearts
    for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (20 + Math.random() * 20) + "px";
        document.body.appendChild(heart);
    }
}
</script>

</body>
</html>
